<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>Neural Boundary Game v2.0.0</title>
  <meta name="description" content="Playable Rust/WASM demo of the core BCI safety rule: raw signal stays inside the device; apps receive typed intent only."/>
  <meta property="og:title" content="Neural Boundary Game v2.0.0"/>
  <meta property="og:description" content="Do not ship raw signal. Ship typed intent."/>
  <meta property="og:image" content="preview.png"/>
  <meta name="theme-color" content="#03070B"/>
  <style>
    :root {
      color-scheme: dark;
      --bg:#03070B; --panel:#071018; --line:#143140; --cyan:#20D6FF;
      --green:#7CFF4F; --red:#FF4D4D; --violet:#9B7CFF; --amber:#FF9F1C;
      --text:#EDF5FF; --muted:#8EA0B6; --dim:#617186;
    }
    * { box-sizing: border-box; }
    html, body {
      margin:0; width:100%; height:100%; background:#03070B; color:var(--text);
      overflow:hidden; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      background:
        radial-gradient(circle at 50% 0%, rgba(32,214,255,.15), transparent 34%),
        radial-gradient(circle at 85% 20%, rgba(155,124,255,.08), transparent 38%),
        linear-gradient(180deg,#03070B,#06111B 62%,#03070B);
    }
    #root { width:100vw; height:100vh; display:grid; place-items:center; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    canvas {
      width:min(100vw,177.78vh);
      height:min(56.25vw,100vh);
      max-width:1280px; max-height:720px; display:block; touch-action:none;
      background:#03070B;
    }
    #hint {
      position:fixed; left:12px; bottom:10px; color:#617186;
      font:600 11px Consolas, "SFMono-Regular", monospace; pointer-events:none;
    }
    @media (max-width: 700px) {
      #hint { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="root">
    <canvas id="nbg" width="1280" height="720" aria-label="Neural Boundary Game playable canvas"></canvas>
  </div>
  <div id="hint">playable canvas • tap action cards • arrows/WASD move gate</div>

<script>
(() => {
  "use strict";

  const W = 1280, H = 720;
  const canvas = document.getElementById("nbg");
  const ctx = canvas.getContext("2d");
  const lanes = [304, 353, 402, 451, 500];

  const COLORS = {
    bg:"#03070B", panel:"#071018", line:"#143140", cyan:"#20D6FF", green:"#7CFF4F",
    red:"#FF4D4D", violet:"#9B7CFF", amber:"#FF9F1C", text:"#EDF5FF", muted:"#8EA0B6", dim:"#617186"
  };

  let state = {
    tick: 0,
    lane: 2,
    trust: 42,
    risk: 22,
    integrity: 100,
    evidence: 0,
    gates: 0,
    consentUntil: 0,
    score: 0,
    phase: "RUNNING",
    flash: "",
    flashT: 0,
    paused: false
  };

  const kinds = {
    RAW:      { color: COLORS.red,    label:"RAW",      hazard:true },
    CONSENT:  { color: COLORS.green,  label:"CONSENT",  action:"consent" },
    EVIDENCE: { color: COLORS.violet, label:"EVIDENCE", action:"evidence" },
    CLAIM:    { color: COLORS.amber,  label:"CLAIM",    hazard:true },
    TYPED:    { color: COLORS.green,  label:"TYPED",    action:"convert" },
    CI:       { color: COLORS.cyan,   label:"CI",       action:"validate" }
  };

  let packets = [];
  let last = performance.now();

  function reset() {
    state = {
      tick: 0, lane: 2, trust: 42, risk: 22, integrity: 100, evidence: 0, gates: 0,
      consentUntil: 0, score: 0, phase: "RUNNING", flash: "RUN START", flashT: 80, paused: false
    };
    packets = [];
    for (let i = 0; i < 7; i++) spawn(-i * 130);
  }

  function spawn(offset = 0) {
    const names = ["RAW", "CONSENT", "EVIDENCE", "CLAIM", "TYPED", "CI"];
    const name = names[Math.floor(Math.random() * names.length)];
    packets.push({
      x: 90 + offset,
      lane: Math.floor(Math.random() * 5),
      kind: name,
      speed: 1.35 + Math.random() * .95,
      seen: false
    });
  }

  function rr(x, y, w, h, r, fill, stroke, lw = 1) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
  }

  function text(t, x, y, font, color, align = "left") {
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.fillText(t, x, y);
  }

  function chip(x, y, label, color) {
    const width = 46 + label.length * 7.5;
    rr(x, y, width, 34, 17, "rgba(7,16,24,.94)", "rgba(32,214,255,.14)");
    text(label, x+16, y+22, "700 12px Consolas, monospace", color);
  }

  function metric(x, y, label, value, color) {
    text(label, x, y + 17, "700 12px Consolas, monospace", COLORS.muted);
    rr(x+78, y+6, 96, 10, 5, "rgba(255,255,255,.055)", null);
    rr(x+78, y+6, Math.max(0, Math.min(96, value * .96)), 10, 5, color, null);
    text(String(value).padStart(3,"0"), x+184, y+17, "700 12px Consolas, monospace", COLORS.text);
  }

  function action(name) {
    if (state.phase !== "RUNNING") {
      if (name === "restart") reset();
      return;
    }
    if (name === "up") state.lane = Math.max(0, state.lane - 1);
    if (name === "down") state.lane = Math.min(4, state.lane + 1);
    if (name === "validate") { state.trust = Math.min(100, state.trust + 2); state.evidence++; flash("VALIDATED"); }
    if (name === "convert") {
      if (state.consentUntil > state.tick) { state.trust = Math.min(100, state.trust + 4); state.score += 40; flash("TYPED INTENT"); }
      else { state.risk = Math.min(100, state.risk + 6); state.integrity = Math.max(0, state.integrity - 2); flash("CONSENT REQUIRED"); }
    }
    if (name === "quarantine") { state.risk = Math.max(0, state.risk - 6); state.score += 20; flash("QUARANTINED"); }
    if (name === "consent") { state.consentUntil = state.tick + 220; state.trust = Math.min(100, state.trust + 1); flash("CONSENT ACTIVE"); }
    if (name === "evidence") {
      if (state.evidence >= (state.gates + 1) * 2 && state.gates < 5) {
        state.gates++; state.trust = Math.min(100, state.trust + 6); state.risk = Math.max(0, state.risk - 2); state.score += 75; flash("EVIDENCE GATE");
      } else { state.risk = Math.min(100, state.risk + 1); flash("NEED EVIDENCE"); }
    }
    if (name === "release") {
      const ready = state.trust >= 90 && state.risk <= 20 && state.integrity >= 80 && state.gates >= 5;
      state.phase = ready ? "VICTORY" : "RELEASE BLOCKED";
      flash(ready ? "REVIEWER SURVIVAL" : "RELEASE BLOCKED");
    }
  }

  function flash(t) { state.flash = t; state.flashT = 90; }

  function update(dt) {
    if (state.paused || state.phase !== "RUNNING") return;
    state.tick++;
    if (state.flashT > 0) state.flashT--;

    for (const p of packets) {
      p.x += p.speed * dt * .06;
      const gy = lanes[state.lane];
      const py = lanes[p.lane];
      if (!p.seen && Math.abs(p.x - 438) < 18 && Math.abs(py - gy) < 12) {
        p.seen = true;
        collide(p);
      }
    }
    packets = packets.filter(p => p.x < 880);
    while (packets.length < 7) spawn(-Math.random() * 240);

    if (state.tick % 190 === 0) state.risk = Math.min(100, state.risk + 1);
    if (state.integrity <= 0 || state.risk >= 100) { state.phase = "BOUNDARY BREACH"; flash("BOUNDARY BREACH"); }
  }

  function collide(p) {
    const k = kinds[p.kind];
    if (p.kind === "RAW") { state.risk = Math.min(100, state.risk + 10); state.integrity = Math.max(0, state.integrity - 8); flash("RAW BLOCKED"); }
    else if (p.kind === "CLAIM") { state.risk = Math.min(100, state.risk + 5); flash("CLAIM REVIEW"); }
    else if (p.kind === "CONSENT") action("consent");
    else if (p.kind === "EVIDENCE") { state.evidence++; state.score += 35; flash("EVIDENCE +1"); }
    else if (p.kind === "TYPED") action("convert");
    else if (p.kind === "CI") action("validate");
  }

  function drawPacket(p) {
    const k = kinds[p.kind];
    const y = lanes[p.lane];
    rr(p.x, y-18, 126, 36, 13, "rgba(7,16,24,.94)", k.color);
    text(k.label, p.x+12, y+4, "800 11px Consolas, monospace", k.color);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = COLORS.bg;
    ctx.fillRect(0, 0, W, H);

    ctx.strokeStyle = "rgba(32,214,255,.040)";
    ctx.lineWidth = 1;
    for (let x=80; x<1200; x+=80) { ctx.beginPath(); ctx.moveTo(x,172); ctx.lineTo(x,570); ctx.stroke(); }
    for (let y=190; y<560; y+=48) { ctx.beginPath(); ctx.moveTo(64,y); ctx.lineTo(1216,y); ctx.stroke(); }

    text("NEURAL BOUNDARY GAME", 640, 78, "800 42px Inter, system-ui, sans-serif", COLORS.text, "center");
    text("Playable release: protect the boundary, convert only typed intent.", 640, 112, "600 15px Consolas, monospace", COLORS.cyan, "center");

    chip(72,112,"AxonOS-BCI",COLORS.cyan);
    chip(196,112,"Playable",COLORS.green);
    chip(306,112,"Rust core",COLORS.violet);
    chip(1025,112,"Help",COLORS.muted);
    chip(1125,112,"Restart",COLORS.amber);

    rr(72,158,1136,44,18,"rgba(7,16,24,.94)",COLORS.line);
    text("RUN",96,186,"700 13px Consolas, monospace",COLORS.muted);
    text(String(state.tick).padStart(4,"0"),134,186,"700 13px Consolas, monospace",COLORS.cyan);
    metric(250,172,"TRUST",state.trust,COLORS.green);
    metric(445,172,"RISK",state.risk,COLORS.red);
    metric(640,172,"INTEGRITY",state.integrity,COLORS.cyan);
    text("EVIDENCE " + Math.min(3, Math.floor(state.evidence / 3)),845,186,"700 13px Consolas, monospace",COLORS.violet);
    text(state.consentUntil > state.tick ? "CONSENT ACTIVE" : "CONSENT IDLE",1010,186,"700 13px Consolas, monospace",state.consentUntil > state.tick ? COLORS.green : COLORS.muted);

    rr(72,222,820,354,24,"rgba(7,16,24,.94)","rgba(32,214,255,.17)",2);
    rr(920,222,288,354,24,"rgba(7,16,24,.94)","rgba(32,214,255,.17)",2);

    text("SIGNAL",102,250,"700 12px Consolas, monospace",COLORS.muted);
    text("BOUNDARY",410,250,"700 12px Consolas, monospace",COLORS.cyan);
    text("APP",798,250,"700 12px Consolas, monospace",COLORS.muted);

    ctx.strokeStyle = "rgba(32,214,255,.14)";
    for (const y of lanes) { ctx.beginPath(); ctx.moveTo(112,y); ctx.lineTo(852,y); ctx.stroke(); }
    ctx.strokeStyle = "rgba(32,214,255,.55)";
    ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(438,274); ctx.lineTo(438,532); ctx.stroke();
    ctx.lineWidth = 1; ctx.strokeStyle = "rgba(255,159,28,.28)";
    ctx.beginPath(); ctx.moveTo(782,274); ctx.lineTo(782,532); ctx.stroke();

    packets.forEach(drawPacket);

    const gy = lanes[state.lane];
    rr(409, gy-24, 58, 48, 16, "rgba(32,214,255,.18)", COLORS.cyan);
    text("GATE",438,gy+5,"800 12px Consolas, monospace",COLORS.cyan,"center");

    text("BOUNDARY PRINCIPLE",950,255,"800 14px Consolas, monospace",COLORS.cyan);
    text("Raw signal stays",950,294,"500 18px Inter, system-ui, sans-serif",COLORS.text);
    text("inside the device.",950,320,"500 18px Inter, system-ui, sans-serif",COLORS.text);
    text("APPS RECEIVE",950,366,"600 13px Consolas, monospace",COLORS.muted);
    pill(950,386,"typed intent",COLORS.green);
    pill(950,420,"consent state",COLORS.cyan);
    pill(950,454,"confidence",COLORS.violet);
    text("APPS NEVER RECEIVE",950,504,"600 13px Consolas, monospace",COLORS.muted);
    pill(950,524,"raw frames",COLORS.red);
    text("gates " + state.gates + "/5",1090,548,"700 12px Consolas, monospace",COLORS.muted);

    const actions = [
      ["1","Validate",COLORS.cyan,"validate"],["2","Convert",COLORS.green,"convert"],["3","Quarantine",COLORS.red,"quarantine"],
      ["4","Consent",COLORS.cyan,"consent"],["5","Evidence",COLORS.violet,"evidence"],["Enter","Release",COLORS.amber,"release"]
    ];
    let x = 72;
    for (const a of actions) {
      rr(x,612,170,62,18,"rgba(7,16,24,.96)","rgba(32,214,255,.16)");
      text(a[0],x+18,636,"800 13px Consolas, monospace",a[2]);
      text(a[1],x+18,660,"700 16px Inter, system-ui, sans-serif",COLORS.text);
      x += 188;
    }

    if (state.flashT > 0) {
      rr(465,128,350,42,18,"rgba(7,16,24,.92)",COLORS.cyan);
      text(state.flash,640,156,"800 15px Consolas, monospace",COLORS.cyan,"center");
    }

    if (state.phase !== "RUNNING") {
      rr(330,250,620,170,28,"rgba(3,7,11,.92)", state.phase === "VICTORY" ? COLORS.green : COLORS.amber, 2);
      text(state.phase,640,312,"900 32px Inter, system-ui, sans-serif", state.phase === "VICTORY" ? COLORS.green : COLORS.amber, "center");
      text("Tap Restart or press R to run again.",640,354,"700 15px Consolas, monospace",COLORS.muted,"center");
    }

    text("v2.0.0  •  playable canvas  •  moving packets  •  touch + keyboard",640,704,"600 12px Consolas, monospace",COLORS.dim,"center");
  }

  function pill(x,y,label,color) {
    rr(x,y,214,24,12,"rgba(255,255,255,.035)",null);
    text(label,x+13,y+17,"700 12px Consolas, monospace",color);
  }

  function toCanvas(ev) {
    const r = canvas.getBoundingClientRect();
    return { x:(ev.clientX-r.left)*W/r.width, y:(ev.clientY-r.top)*H/r.height };
  }

  function actionAt(x,y) {
    if (x > 1025 && x < 1120 && y > 112 && y < 146) return "help";
    if (x > 1125 && x < 1230 && y > 112 && y < 146) return "restart";
    if (y >= 612 && y <= 674) {
      const idx = Math.floor((x - 72) / 188);
      return ["validate","convert","quarantine","consent","evidence","release"][idx] || "none";
    }
    if (x < 910 && y > 222 && y < 576) return y < 399 ? "up" : "down";
    return "none";
  }

  canvas.addEventListener("pointerdown", ev => {
    const p = toCanvas(ev);
    const a = actionAt(p.x,p.y);
    if (a === "help") flash("WASD / ARROWS / TAP LANES");
    else if (a === "restart") reset();
    else action(a);
  });

  window.addEventListener("keydown", ev => {
    if (ev.key === "ArrowUp" || ev.key === "w" || ev.key === "W") action("up");
    else if (ev.key === "ArrowDown" || ev.key === "s" || ev.key === "S") action("down");
    else if (ev.key === "1" || ev.key === " ") action("validate");
    else if (ev.key === "2") action("convert");
    else if (ev.key === "3") action("quarantine");
    else if (ev.key === "4") action("consent");
    else if (ev.key === "5") action("evidence");
    else if (ev.key === "Enter") action("release");
    else if (ev.key === "r" || ev.key === "R") reset();
    else if (ev.key === "p" || ev.key === "P") state.paused = !state.paused;
  });

  function loop(now) {
    const dt = Math.min(40, now - last);
    last = now;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
