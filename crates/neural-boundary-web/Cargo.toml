[package]
name = "neural-boundary-web"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Dependency-light WebAssembly ABI adapter for Neural Boundary Game."

[lib]
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
neural-boundary-core = { path = "../neural-boundary-core" }

[lints.rust]
unsafe_code = "allow"
missing_docs = "warn"
unsafe_op_in_unsafe_fn = "deny"

[lints.clippy]
all = "warn"
pedantic = "warn"
