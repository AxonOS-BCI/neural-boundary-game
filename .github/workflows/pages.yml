name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Foundation Pages / build AxonOS Boundary Console
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build static Pages artifact
        env:
          DIST_DIR: dist
        run: |
          set -euo pipefail

          echo "Repository surface:"
          find . -maxdepth 3 -type f | sort | grep -E '(^./index.html|^./web/|scripts/build_web.sh|Cargo.toml|VERSION)' || true

          rm -rf dist
          mkdir -p dist

          if [ -x scripts/build_web.sh ]; then
            echo "Using scripts/build_web.sh"
            bash scripts/build_web.sh || {
              echo "WARN: scripts/build_web.sh failed; falling back to static copy."
              rm -rf dist
              mkdir -p dist
            }
          fi

          if [ ! -s dist/index.html ]; then
            echo "Static fallback copy"
            test -s index.html
            cp index.html dist/index.html

            if [ -d web ]; then
              cp -R web dist/web
            fi

            for f in *.js *.css *.json *.png *.svg *.ico; do
              [ -f "$f" ] && cp "$f" dist/ || true
            done
          fi

          test -s dist/index.html

          cp dist/index.html dist/404.html
          touch dist/.nojekyll

          BUILD_ID="$(date -u +%Y%m%d%H%M%S)"
          printf '%s\n' "$BUILD_ID" > dist/build-id.txt

          cat > dist/cache-reset.js <<'JS'
          (() => {
            try {
              for (const key of Object.keys(localStorage)) {
                if (
                  key.startsWith("axonos_nbg_v300_") ||
                  key.startsWith("axonos_nbg_v730_") ||
                  key.startsWith("axonos_boundary_v730_")
                ) localStorage.removeItem(key);
              }
            } catch (_) {}

            if ("serviceWorker" in navigator) {
              navigator.serviceWorker.getRegistrations()
                .then((regs) => Promise.all(regs.map((r) => r.unregister())))
                .catch(() => {});
            }
          })();
JS

          python3 - <<'PY'
          from pathlib import Path

          p = Path("dist/index.html")
          s = p.read_text(encoding="utf-8", errors="ignore")

          s = s.replace("Neural Boundary Game v3.0.0", "AxonOS Boundary Console v7.3.0 RC1")
          s = s.replace("SOVEREIGN BOUNDARY SIMULATION · v3.0.0", "AXONOS BOUNDARY CONSOLE · v7.3.0 RC1")
          s = s.replace("Neural Boundary Game", "AxonOS Boundary Console")

          if "cache-reset.js" not in s:
              s = s.replace("</body>", '<script src="./cache-reset.js?v=703004"></script>\n</body>')

          s = s.replace('src="./web/app.js"', 'src="./web/app.js?v=703004"')
          s = s.replace('src="web/app.js"', 'src="web/app.js?v=703004"')
          s = s.replace('href="./web/styles.css"', 'href="./web/styles.css?v=703004"')
          s = s.replace('href="web/styles.css"', 'href="web/styles.css?v=703004"')

          p.write_text(s, encoding="utf-8")
PY

          echo "Artifact surface:"
          find dist -maxdepth 3 -type f | sort

          echo "## Pages artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- product: AxonOS Boundary Console" >> "$GITHUB_STEP_SUMMARY"
          echo "- version: v7.3.0 RC1" >> "$GITHUB_STEP_SUMMARY"
          echo "- build-id: $BUILD_ID" >> "$GITHUB_STEP_SUMMARY"
          find dist -maxdepth 3 -type f | sort | sed 's#^#- #' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Foundation Pages / deploy AxonOS Boundary Console
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy Pages artifact
        uses: actions/deploy-pages@v4
        id: deployment
