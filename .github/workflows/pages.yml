name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Foundation Pages / build AxonOS Boundary Console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Pages artifact
        run: |
          set -euo pipefail
          test -f web/index.html
          test -f web/manifest.json
          rm -rf dist
          mkdir -p dist
          cp -a web/. dist/
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          find dist -maxdepth 2 -type f | sort

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Foundation Pages / deploy public RC surface
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
