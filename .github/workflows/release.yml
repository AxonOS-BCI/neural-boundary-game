name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Main branch validation
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          echo "Release workflow OK."
          echo "Main branch push detected."
          echo "No GitHub Release is created from branch pushes."
          echo "GitHub Releases are created only from v* tags."

      - name: Publish tagged release
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="Neural Boundary Game ${TAG} — Elite Foundation Grande AxonOS Standard"

          if [ ! -f RELEASE_NOTES.md ]; then
            echo "# ${TITLE}" > RELEASE_NOTES.md
            echo "" >> RELEASE_NOTES.md
            echo "Stable public release." >> RELEASE_NOTES.md
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md \
              --latest
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file RELEASE_NOTES.md \
              --latest
          fi
