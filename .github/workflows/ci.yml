name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-gates:
    name: Static repository gates
    runs-on: ubuntu-24.04
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Reject empty deployment files
        run: |
          test -s index.html
          test -s web/app.js
          test -s web/styles.css
          test -s scripts/build_web.sh
          test -s .github/workflows/ci.yml
          test -s .github/workflows/pages.yml

      - name: Reject unresolved merge conflicts
        run: |
          ! grep -RInE '(<{7}|={7}|>{7})' \
            .github index.html scripts web crates docs tools vectors \
            --exclude-dir=.git

      - name: Check shell syntax
        run: |
          bash -n scripts/build_web.sh
          if [ -f scripts/verify_release.sh ]; then
            bash -n scripts/verify_release.sh
          fi

      - name: Check JavaScript syntax
        run: node --check web/app.js
