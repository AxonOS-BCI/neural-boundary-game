name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  fmt:
    name: 01 fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  core-tests:
    name: 02 core tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p neural-boundary-core

  cli-tests:
    name: 03 cli tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p neural-boundary-cli

  web-tests:
    name: 04 web tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p neural-boundary-web

  web-native-check:
    name: 05 web native check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo check -p neural-boundary-web

  wasm-build:
    name: 06 wasm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo build -p neural-boundary-web --target wasm32-unknown-unknown --release

  replay-vector:
    name: 07 replay vector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/validate_replay.py

  checksum:
    name: 08 checksum
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/release_check.py

  claim-hygiene:
    name: 09 claim hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/check_hygiene.py

  docs:
    name: 10 docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/check_docs.py

  licenses:
    name: 11 licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 tools/check_license.py

  preview:
    name: 12 preview asset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python3 -m pip install pillow
      - run: python3 tools/check_preview.py
