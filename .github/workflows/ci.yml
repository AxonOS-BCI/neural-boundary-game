name: CI

on:
  push:
    branches: [main, "release/**"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-gates:
    name: Repository gates
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Validate exact source surface
        run: ./scripts/verify_release.sh --static
      - name: Prove reproducible source packaging
        env:
          SOURCE_DATE_EPOCH: "946684800"
        run: |
          python3 tools/package_release.py --output /tmp/release-assets-a
          python3 tools/package_release.py --output /tmp/release-assets-b
          cmp /tmp/release-assets-a/neural-boundary-game-v3.0.0-source.zip /tmp/release-assets-b/neural-boundary-game-v3.0.0-source.zip
          cmp /tmp/release-assets-a/neural-boundary-game-v3.0.0-source.tar.gz /tmp/release-assets-b/neural-boundary-game-v3.0.0-source.tar.gz
          cmp /tmp/release-assets-a/SHA256SUMS /tmp/release-assets-b/SHA256SUMS

  rust-and-protocol:
    name: Rust, protocol, and WASM
    runs-on: ubuntu-24.04
    timeout-minutes: 22
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install pinned Rust toolchain
        run: |
          rustup toolchain install 1.81.0 --profile minimal --component rustfmt,clippy --target wasm32-unknown-unknown
          rustup override set 1.81.0
      - name: Full compiler and protocol gate
        run: ./scripts/verify_release.sh --full
      - name: Inspect artifact
        run: |
          test -s dist/index.html
          test -s dist/web/app.js
          test -s dist/web/styles.css
          test -s dist/pkg/neural_boundary_web.wasm
          test -s dist/build-info.json
          ! grep -R -nE '<<<<<<<|=======|>>>>>>>' dist
