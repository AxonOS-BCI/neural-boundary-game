name: CI

on:
  push:
    branches: [main, "release/**", "fix/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  foundation-gate:
    name: ${{ matrix.title }}
    runs-on: ubuntu-latest
    timeout-minutes: 6
    strategy:
      fail-fast: false
      matrix:
        include:
          - lane: 1
            title: "Foundation Identity / product surface"
            description: "README positions the project as AxonOS Boundary Console, not a casual browser game."
          - lane: 2
            title: "Foundation Identity / version pin"
            description: "VERSION anchors v7.3.0 as the canonical release candidate line."
          - lane: 3
            title: "Foundation Rust / workspace manifest"
            description: "Cargo workspace must remain explicit and auditable."
          - lane: 4
            title: "Foundation Rust / lockfile provenance"
            description: "Cargo.lock must be present for reproducible dependency review."
          - lane: 5
            title: "Foundation Legal / root license"
            description: "Root license surface must exist before public visibility."
          - lane: 6
            title: "Foundation Legal / commercial license"
            description: "Commercial boundary must be explicit for serious funding conversations."
          - lane: 7
            title: "Foundation Security / disclosure policy"
            description: "SECURITY.md must exist with a public disclosure surface."
          - lane: 8
            title: "Foundation Privacy / public notice"
            description: "Privacy posture must be visible before any public demo."
          - lane: 9
            title: "Foundation Release / release notes"
            description: "Release notes must explain the RC line."
          - lane: 10
            title: "Foundation Evidence / evidence report"
            description: "Evidence report must exist as release provenance."
          - lane: 11
            title: "Foundation Evidence / source manifest"
            description: "Source manifest anchors file-level integrity."
          - lane: 12
            title: "Foundation Release / release.toml"
            description: "Machine-readable release metadata must reference v7.3.0."
          - lane: 13
            title: "Foundation Runtime / web entrypoint"
            description: "The public console must have a concrete static entrypoint."
          - lane: 14
            title: "Foundation Runtime / PWA manifest"
            description: "PWA metadata must be valid JSON."
          - lane: 15
            title: "Foundation Runtime / service worker"
            description: "Offline/fallback surface must be explicitly present."
          - lane: 16
            title: "Foundation Runtime / WASM artifact surface"
            description: "WASM presence or build-output posture is inspected."
          - lane: 17
            title: "Foundation Replay / canonical vectors"
            description: "Replay vector set must contain the v7.3.0 conformance corpus."
          - lane: 18
            title: "Foundation Data / JSON validity"
            description: "All JSON config and metadata surfaces must parse."
          - lane: 19
            title: "Foundation Tooling / replay validator"
            description: "Replay validation tool must be present."
          - lane: 20
            title: "Foundation Tooling / version validator"
            description: "Version consistency tool must be present."
          - lane: 21
            title: "Foundation Tooling / web build script"
            description: "Web build script must be present."
          - lane: 22
            title: "Foundation Tooling / release gate script"
            description: "Release gate script must be present."
          - lane: 23
            title: "Foundation Hygiene / stale version exclusion"
            description: "Legacy v5/v3 public references must not leak into the RC surface."
          - lane: 24
            title: "Foundation Security / token scan"
            description: "Obvious secret and token patterns are rejected."
          - lane: 25
            title: "Foundation Integrity / conflict markers"
            description: "Unresolved merge conflict markers are rejected."
          - lane: 26
            title: "Foundation Provenance / binary bloat guard"
            description: "Oversized checked-in artifacts are rejected."
          - lane: 27
            title: "Foundation DOGE / commercial safety"
            description: "DOGE config must not enable custody or public commercial flow in RC."
          - lane: 28
            title: "Foundation Tooling / script failure discipline"
            description: "Shell scripts must use failure discipline."
          - lane: 29
            title: "Foundation Docs / substance gate"
            description: "Core policy and legal docs must be non-empty."
          - lane: 30
            title: "Foundation Actions / CI workflow"
            description: "CI workflow must exist."
          - lane: 31
            title: "Foundation Actions / Pages workflow"
            description: "Pages workflow must exist."
          - lane: 32
            title: "Foundation Presentation / preview asset"
            description: "Preview image must exist for public presentation."
          - lane: 33
            title: "Foundation Positioning / cognitive sovereignty"
            description: "README must explicitly state Cognitive Sovereignty Runtime."
          - lane: 34
            title: "Foundation Positioning / Rust WASM"
            description: "README must expose Rust/WASM technical substance."
          - lane: 35
            title: "Foundation Distribution / canonical demo URL"
            description: "README must point to the canonical Pages URL."
          - lane: 36
            title: "Foundation Standard / governance brief"
            description: "Foundation Standard document must exist."
          - lane: 37
            title: "Foundation Standard / CI annotation"
            description: "CI_37 document must describe the gate system."
    steps:
      - uses: actions/checkout@v4

      - name: Execute Foundation Gate
        env:
          LANE: ${{ matrix.lane }}
          GATE_TITLE: ${{ matrix.title }}
          GATE_DESCRIPTION: ${{ matrix.description }}
        run: |
          set -euo pipefail
          echo "## $GATE_TITLE" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$GATE_DESCRIPTION" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          python3 tools/ci_37_gate.py
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result:** pass." >> "$GITHUB_STEP_SUMMARY"
