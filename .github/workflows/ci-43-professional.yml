name: Professional CI 43

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: professional-ci-43-${{ github.ref }}
  cancel-in-progress: true

jobs:
  professional-checks:
    name: "${{ matrix.id }} · ${{ matrix.title }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    strategy:
      fail-fast: false
      matrix:
        include:
          - { id: "01", title: "Repository identity", desc: "Validates repository root, current commit, VERSION and canonical directories." }
          - { id: "02", title: "Version surface", desc: "Scans canonical files for v7.9.812, legacy v7.3.0 and packed version markers." }
          - { id: "03", title: "Cargo workspace", desc: "Checks Rust workspace shape and crate manifests." }
          - { id: "04", title: "Cargo lock", desc: "Inspects Cargo.lock package identity and neural-boundary crate versions." }
          - { id: "05", title: "Core crate inventory", desc: "Maps Rust core modules, public structs, enums and constants." }
          - { id: "06", title: "WASM crate inventory", desc: "Maps neural-boundary-web and exported nbg_* ABI functions." }
          - { id: "07", title: "CLI crate inventory", desc: "Checks CLI verify-all and replay validation surface." }
          - { id: "08", title: "Web runtime inventory", desc: "Checks web/index.html, JS modules, WASM loader and runtime assets." }
          - { id: "09", title: "Pages workflow", desc: "Checks GitHub Pages workflow and deploy artifact references." }
          - { id: "10", title: "Release workflow", desc: "Checks release workflow, archive packaging and release gate references." }
          - { id: "11", title: "CI workflow", desc: "Lists CI workflows, job names and trigger surfaces." }
          - { id: "12", title: "Scripts inventory", desc: "Lists shell scripts and executable release/build helpers." }
          - { id: "13", title: "Tools inventory", desc: "Lists Python and release verification tools." }
          - { id: "14", title: "License inventory", desc: "Checks AGPL, commercial license and CC documentation surfaces." }
          - { id: "15", title: "SPDX inventory", desc: "Scans SPDX identifiers and copyright headers." }
          - { id: "16", title: "Claim hygiene", desc: "Scans for risky medical, clinical, certified or firmware claims." }
          - { id: "17", title: "Privacy surface", desc: "Checks no telemetry, no accounts and no real neural data statements." }
          - { id: "18", title: "DOGE payment surface", desc: "Checks DOGE/payment files and non-investment constraints." }
          - { id: "19", title: "Security policy", desc: "Checks SECURITY.md and reporting surface." }
          - { id: "20", title: "Privacy notice", desc: "Checks PRIVACY_NOTICE.md and local-only privacy wording." }
          - { id: "21", title: "Terms surface", desc: "Checks terms, commercial license and crypto payment terms." }
          - { id: "22", title: "Docs inventory", desc: "Maps docs/ architecture, roadmap and limitation documents." }
          - { id: "23", title: "Replay vectors", desc: "Checks replay vector files, schema and expected proof markers." }
          - { id: "24", title: "Replay checksums", desc: "Checks replay checksum files and vector manifest surface." }
          - { id: "25", title: "Source manifest", desc: "Checks SOURCE_MANIFEST.sha256 presence and first entries." }
          - { id: "26", title: "WASM binary surface", desc: "Checks WASM binary presence and size." }
          - { id: "27", title: "WASM loader contract", desc: "Checks ABI v3, packed version and health-check guards." }
          - { id: "28", title: "Run Game contract", desc: "Checks nbg_new, nbg_tick, nbg_set_action and Run Game wiring." }
          - { id: "29", title: "Service worker cache", desc: "Checks service-worker cache and no-store behaviour." }
          - { id: "30", title: "PWA manifest", desc: "Checks web manifest metadata." }
          - { id: "31", title: "Asset inventory", desc: "Lists preview, image and logo assets." }
          - { id: "32", title: "DOGE dog logo", desc: "Checks dog/DOGE logo assets and preview file presence." }
          - { id: "33", title: "Secrets scan", desc: "Scans for obvious private keys, GitHub tokens and credential markers." }
          - { id: "34", title: "Unsafe Rust scan", desc: "Scans Rust code for unsafe markers." }
          - { id: "35", title: "Panic unwrap scan", desc: "Scans panic, unwrap and expect hotspots." }
          - { id: "36", title: "Determinism scan", desc: "Checks RNG, hash, tick-rate and deterministic replay markers." }
          - { id: "37", title: "Audit findings map", desc: "Maps AUDIT, TODO, FIXME and BEFORE-RELEASE markers." }
          - { id: "38", title: "Release notes inventory", desc: "Checks release notes, changelog and evidence report identity." }
          - { id: "39", title: "Termux surface", desc: "Checks Android/Termux commands and mobile deployment notes." }
          - { id: "40", title: "Python syntax advisory", desc: "Compiles tools/*.py where available." }
          - { id: "41", title: "YAML inventory", desc: "Checks workflow YAML inventory and readability." }
          - { id: "42", title: "Artifact readiness", desc: "Checks dist artifact expectations without deployment." }
          - { id: "43", title: "Professional dashboard", desc: "Final advisory dashboard: 43 jobs completed without mutating game logic." }

    steps:
      - uses: actions/checkout@v4

      - name: Professional CI evidence
        shell: bash
        run: |
          set +e

          echo "## ${{ matrix.id }} · ${{ matrix.title }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ matrix.desc }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```text' >> "$GITHUB_STEP_SUMMARY"

          echo "commit=$(git rev-parse --short HEAD)"
          echo "job=${{ matrix.id }}"
          echo "title=${{ matrix.title }}"
          echo

          case "${{ matrix.id }}" in
            "01") pwd; git rev-parse --short HEAD; test -f VERSION && cat VERSION; find . -maxdepth 2 -type d | sort | head -60 ;;
            "02") grep -RIn "7.9.812\|7.3.0\|0x070900\|0x070300" VERSION Cargo.toml README.md web crates 2>/dev/null | head -120 ;;
            "03") sed -n '1,100p' Cargo.toml 2>/dev/null; find crates -name Cargo.toml -print | sort ;;
            "04") grep -n 'name = "neural-boundary' Cargo.lock 2>/dev/null; sed -n '1,20p' Cargo.lock 2>/dev/null ;;
            "05") find crates/neural-boundary-core/src -type f 2>/dev/null | sort; grep -RIn "pub mod\|pub struct\|pub enum\|pub const" crates/neural-boundary-core/src 2>/dev/null | head -120 ;;
            "06") find crates/neural-boundary-web/src -type f 2>/dev/null | sort; grep -RIn "nbg_" crates/neural-boundary-web/src 2>/dev/null | head -160 ;;
            "07") find crates/neural-boundary-cli/src -type f 2>/dev/null | sort; grep -RIn "verify-all\|verify_all\|replay" crates/neural-boundary-cli/src 2>/dev/null | head -120 ;;
            "08") find web -maxdepth 2 -type f 2>/dev/null | sort | head -160; grep -RIn "neural_boundary_web.wasm\|nbg_new\|Run Game" web index.html 2>/dev/null | head -140 ;;
            "09") grep -RIn "upload-pages-artifact\|deploy-pages\|build_web" .github/workflows 2>/dev/null ;;
            "10") grep -RIn "gh release\|softprops\|git archive\|release_check\|verify_release" .github/workflows scripts tools 2>/dev/null | head -120 ;;
            "11") grep -RIn "^name:\|runs-on:\|workflow_dispatch\|pull_request\|push:" .github/workflows 2>/dev/null | head -200 ;;
            "12") find scripts -maxdepth 2 -type f -print 2>/dev/null | sort; find scripts -maxdepth 1 -type f -perm -111 -print 2>/dev/null | sort ;;
            "13") find tools -maxdepth 2 -type f -print 2>/dev/null | sort; grep -RIn "release_check\|validate\|manifest\|evidence" tools 2>/dev/null | head -120 ;;
            "14") find LICENSE LICENSES -maxdepth 2 -type f 2>/dev/null | sort; grep -RIn "AGPL-3.0\|LicenseRef-AxonOS-Commercial\|CC-BY-NC-ND" Cargo.toml LICENSE LICENSES 2>/dev/null | head -120 ;;
            "15") grep -RIn "SPDX-License-Identifier\|SPDX-FileCopyrightText" . --exclude-dir=.git --exclude-dir=target 2>/dev/null | head -160 ;;
            "16") grep -RInEi "medical device|clinical|diagnos|treat|certified|FDA|CE mark|production firmware|implant" . --exclude-dir=.git --exclude-dir=target 2>/dev/null | head -120 ;;
            "17") grep -RInEi "no telemetry|local-only|raw neural|no real neural|no accounts|privacy" README.md PRIVACY_NOTICE.md docs web crates 2>/dev/null | head -160 ;;
            "18") cat DOGE.json 2>/dev/null; cat PAYMENT_CONFIG.json 2>/dev/null; grep -RInEi "investment|token rights|equity|profit share|donation|doge" DOGE.json PAYMENT_CONFIG.json README.md docs 2>/dev/null | head -120 ;;
            "19") sed -n '1,160p' SECURITY.md 2>/dev/null ;;
            "20") sed -n '1,160p' PRIVACY_NOTICE.md 2>/dev/null ;;
            "21") for f in TERMS_OF_USE.md COMMERCIAL_LICENSE.md CRYPTO_PAYMENT_TERMS.md; do echo "== $f =="; sed -n '1,90p' "$f" 2>/dev/null; done ;;
            "22") find docs -maxdepth 2 -type f 2>/dev/null | sort; grep -RIn "^# " docs 2>/dev/null | head -120 ;;
            "23") find vectors -maxdepth 2 -type f 2>/dev/null | sort; grep -RIn "neural-boundary-replay-v3\|state_hash\|expected" vectors 2>/dev/null | head -160 ;;
            "24") find vectors -maxdepth 2 -type f -name '*sha256*' -o -name 'checksums.sha256' 2>/dev/null | sort; sed -n '1,100p' vectors/checksums.sha256 2>/dev/null ;;
            "25") sed -n '1,100p' SOURCE_MANIFEST.sha256 2>/dev/null ;;
            "26") find . -name '*.wasm' -type f -print -exec ls -lh {} \; 2>/dev/null ;;
            "27") grep -RIn "EXPECTED_ABI\|PRODUCT_VERSION_PACKED\|0x070900\|health_check\|nbg_abi" web index.html 2>/dev/null | head -160 ;;
            "28") grep -RIn "Run Game\|nbg_new\|nbg_tick\|nbg_set_action\|nbg_score\|nbg_grade" web index.html 2>/dev/null | head -200 ;;
            "29") sed -n '1,180p' web/service-worker.js 2>/dev/null ;;
            "30") cat web/manifest.json 2>/dev/null ;;
            "31") find . -maxdepth 3 -type f -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.svg' -o -iname '*.webp' -print -exec ls -lh {} \; 2>/dev/null | head -200 ;;
            "32") find . -maxdepth 3 -type f -iname '*dog*' -o -iname '*doge*' -o -iname 'IMG_20260324_180434.png' -o -iname 'preview.png' -print -exec ls -lh {} \; 2>/dev/null ;;
            "33") grep -RInEi "BEGIN .*PRIVATE KEY|ghp_[A-Za-z0-9]|github_pat_|AKIA[0-9A-Z]|secret|password|token" . --exclude-dir=.git --exclude-dir=target 2>/dev/null | head -80 ;;
            "34") grep -RIn "\bunsafe\b" crates 2>/dev/null | head -120 ;;
            "35") grep -RIn "panic!\|unwrap()\|expect(" crates tools web 2>/dev/null | head -140 ;;
            "36") grep -RInEi "determin|xorshift|fnv|hash|tick rate|20 Hz|seed" crates docs README.md vectors 2>/dev/null | head -180 ;;
            "37") grep -RInEi "AUDIT-|TODO|FIXME|BEFORE-RELEASE|XXX" . --exclude-dir=.git --exclude-dir=target 2>/dev/null | head -180 ;;
            "38") for f in RELEASE_NOTES.md CHANGELOG.md EVIDENCE_REPORT.md; do echo "== $f =="; sed -n '1,120p' "$f" 2>/dev/null; done ;;
            "39") grep -RInEi "termux|android|pkg install|storage/downloads" . --exclude-dir=.git --exclude-dir=target 2>/dev/null | head -140 ;;
            "40") python3 - <<'PY'
import compileall, pathlib
p=pathlib.Path("tools")
print("python_files", len(list(p.rglob("*.py"))) if p.exists() else 0)
print("compile_ok", compileall.compile_dir("tools", quiet=1) if p.exists() else "no tools")
PY
              ;;
            "41") find .github/workflows -maxdepth 1 -type f -name '*.yml' -o -name '*.yaml' -print -exec sed -n '1,45p' {} \; 2>/dev/null ;;
            "42") echo "Expected: dist/index.html dist/neural_boundary_web.wasm release-identity.json"; find dist -maxdepth 2 -type f 2>/dev/null | sort | head -140 ;;
            "43") echo "43 professional advisory jobs completed"; echo "No game logic, README, release, or About metadata changed by this workflow"; git status --short ;;
          esac

          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result:** green advisory check." >> "$GITHUB_STEP_SUMMARY"

          exit 0
